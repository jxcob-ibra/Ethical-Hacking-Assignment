version: '3.8'

services:
  # PHP/Apache Web Server
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: myeduconnect-web
    ports:
      - "8080:80"
      - "8443:443"
      - "2222:22"
    volumes:
      - .:/var/www/html
      - ./app/uploads:/var/www/html/app/uploads
    environment:
      - DB_HOST=mysql
      - DB_NAME=myeduconnect
      - DB_USER=root
      - DB_PASS=rootpassword
      - APP_URL=http://localhost:8080
    depends_on:
      - mysql
    networks:
      - myeduconnect-network

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: myeduconnect-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: myeduconnect
      MYSQL_USER: myeduconnect
      MYSQL_PASSWORD: myeduconnect
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - myeduconnect-network

  # phpMyAdmin (Optional)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: myeduconnect-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - mysql
    networks:
      - myeduconnect-network

networks:
  myeduconnect-network:
    driver: bridge

volumes:
  mysql-data:
