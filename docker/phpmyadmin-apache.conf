<Directory /var/www/html>
    # Use the wrapper script as the index
    DirectoryIndex /tmp/phpmyadmin-storage/phpmyadmin_index_wrapper.php index.php
    
    # Ensure the wrapper script is executed
    <FilesMatch "^index\.php$">
        # Redirect to wrapper if access check file exists
        RewriteEngine On
        RewriteCond /tmp/phpmyadmin-storage/phpmyadmin_access.php -f
        RewriteRule ^index\.php$ /tmp/phpmyadmin-storage/phpmyadmin_index_wrapper.php [L]
    </FilesMatch>
</Directory>
